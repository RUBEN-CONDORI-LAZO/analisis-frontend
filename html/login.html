<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FELCC DP-8 — Iniciar Sesión</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">

</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-logo-wrap">
            <div class="login-logo"><i class="fas fa-shield-halved"></i></div>
            <h1>FELCC DP-8</h1>
            <p>SISTEMA JUDICIAL POLICIAL</p>
        </div>

        {% if error %}
        <div class="error-banner">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form class="login-form" method="POST" action="/login">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" placeholder="ejemplo@gmail.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Ingresar al Sistema
            </button>
        </form>

        <div class="login-hint">
            <p>CREDENCIALES DE ACCESO</p>
            <div class="hint-row"><span>👤 admin@gmail.com</span><strong>12345</strong></div>
            <div class="hint-row"><span>🚔 policia@gmail.com</span><strong>12345</strong></div>
            <div class="hint-row"><span>⚖️ fiscal@gmail.com</span><strong>12345</strong></div>
        </div>

        <div style="text-align:center; margin-top:20px;">
            <a href="/" style="font-size:13px; color:#64748b; text-decoration:none;">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>
        </div>
    </div>
</div>
</body>
</html>
